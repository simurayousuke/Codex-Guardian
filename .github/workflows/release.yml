name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Package
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "bin/Release/net9.0-windows/win-x64/publish"
          $artifactDir = Join-Path $PWD "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item -LiteralPath (Join-Path $publishDir "CodexGuardian.exe") -Destination (Join-Path $artifactDir "CodexGuardian.exe") -Force
          Compress-Archive -LiteralPath (Join-Path $publishDir "CodexGuardian.exe") -DestinationPath (Join-Path $artifactDir "CodexGuardian-win-x64.zip") -Force

      - name: Create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          TAG_NAME: v0.1.0
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $api = "https://api.github.com/repos/$env:REPOSITORY"
          $releaseBody = @{
            tag_name = $env:TAG_NAME
            target_commitish = $env:TARGET_SHA
            name = "Codex Guardian $env:TAG_NAME"
            body = @"
          Codex Guardian の初回リリースです。

          - Windows 通知領域に常駐します。
          - Codex プロセスの終了を検出して再起動します。
          - Windows 起動時の自動開始を設定できます。
          - 必要に応じて Codex Guardian 自身の自動復旧を有効にできます。

          `CodexGuardian.exe` は .NET ランタイムを別途入れなくても動作する win-x64 self-contained 版です。
          "@
            draft = $false
            prerelease = $false
            make_latest = "true"
          }

          try {
            $release = Invoke-RestMethod -Method Get -Uri "$api/releases/tags/$env:TAG_NAME" -Headers $headers
            $release = Invoke-RestMethod -Method Patch -Uri "$api/releases/$($release.id)" -Headers $headers -ContentType "application/json" -Body ($releaseBody | ConvertTo-Json)
            $assets = Invoke-RestMethod -Method Get -Uri "$api/releases/$($release.id)/assets" -Headers $headers
            foreach ($asset in $assets) {
              if ($asset.name -in @("CodexGuardian.exe", "CodexGuardian-win-x64.zip")) {
                Invoke-RestMethod -Method Delete -Uri "$api/releases/assets/$($asset.id)" -Headers $headers | Out-Null
              }
            }
          }
          catch {
            if ($_.Exception.Response.StatusCode.value__ -ne 404) {
              throw
            }
            $release = Invoke-RestMethod -Method Post -Uri "$api/releases" -Headers $headers -ContentType "application/json" -Body ($releaseBody | ConvertTo-Json)
          }

          foreach ($file in @("CodexGuardian.exe", "CodexGuardian-win-x64.zip")) {
            $path = Join-Path $PWD "artifacts/$file"
            $uploadUri = "https://uploads.github.com/repos/$env:REPOSITORY/releases/$($release.id)/assets?name=$file"
            Invoke-RestMethod -Method Post -Uri $uploadUri -Headers $headers -ContentType "application/octet-stream" -InFile $path | Out-Null
          }
